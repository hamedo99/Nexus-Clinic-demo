<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boneGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="xrayGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" />
  
  <!-- Tibia (Thicker bone) -->
  <path d="M250,50 Q280,50 290,100 L280,300 Q270,350 250,350 Q230,350 220,300 L230,100 Q240,50 250,50 Z" fill="url(#boneGradient)" opacity="0.9" filter="url(#xrayGlow)" />
  
  <!-- Fibula (Thinner bone) -->
  <path d="M320,80 Q330,80 335,100 L330,320 Q325,340 320,340 Q315,340 310,320 L315,100 Q315,80 320,80 Z" fill="url(#boneGradient)" opacity="0.7" filter="url(#xrayGlow)" />
  
  <!-- Intramedullary Nail -->
  <rect x="245" y="60" width="10" height="280" rx="2" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1" opacity="0.8" />
  
  <!-- Screws -->
  <circle cx="250" cy="80" r="4" fill="#cbd5e1" />
  <circle cx="250" cy="100" r="4" fill="#cbd5e1" />
  <circle cx="250" cy="300" r="4" fill="#cbd5e1" />
  <circle cx="250" cy="320" r="4" fill="#cbd5e1" />

  <!-- Fracture Line (healed) -->
  <path d="M225,200 L285,190" stroke="#0f172a" stroke-width="2" opacity="0.5" />
</svg>
