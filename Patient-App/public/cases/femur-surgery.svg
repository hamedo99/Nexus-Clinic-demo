<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="woundGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#be123c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#881337;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="boneColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#4c0519" />
  
  <!-- Surgical Drape -->
  <path d="M0,0 L600,0 L600,400 L0,400 M100,100 L500,100 L500,300 L100,300 Z" fill="#064e3b" fill-rule="evenodd" />
  
  <!-- Exposed Bone (Femur) -->
  <rect x="150" y="180" width="300" height="40" rx="5" fill="url(#boneColor)" />
  
  <!-- Metal Plate -->
  <rect x="180" y="190" width="240" height="20" rx="2" fill="url(#metalGradient)" stroke="#475569" stroke-width="1" />
  
  <!-- Screws -->
  <circle cx="200" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  <circle cx="240" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  <circle cx="280" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  <circle cx="320" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  <circle cx="360" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  <circle cx="400" cy="200" r="5" fill="#e2e8f0" stroke="#475569" stroke-width="1" />
  
  <!-- Retractors (Instruments) -->
  <path d="M120,80 L140,180" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" />
  <path d="M480,80 L460,180" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" />

</svg>
