<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" />
  <rect width="600" height="400" fill="url(#grid)" opacity="0.1"/>
  
  <!-- Leg and Foot Outline (Dorsiflexion) -->
  <path d="M150,100 L150,300 Q150,350 200,350 L350,250 Q380,230 350,200 Q320,180 300,220 L220,280 L200,100 Z" fill="none" stroke="#fb923c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Fill -->
  <path d="M150,100 L150,300 Q150,350 200,350 L350,250 Q380,230 350,200 Q320,180 300,220 L220,280 L200,100" fill="url(#skinGradient)" opacity="0.2" />

  <!-- Arrow indicating motion -->
  <path d="M350,300 Q400,250 380,150" stroke="#0ea5e9" stroke-width="8" fill="none" marker-end="url(#arrowhead)" />
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0ea5e9" />
    </marker>
  </defs>

  <!-- Ground Line -->
  <line x1="50" y1="380" x2="550" y2="380" stroke="#94a3b8" stroke-width="2" />
  
  <!-- Text Label -->
  <text x="50" y="50" font-family="Arial" font-size="24" fill="#64748b" font-weight="bold">Post-Op Range of Motion</text>
  <text x="50" y="80" font-family="Arial" font-size="16" fill="#94a3b8">Full Dorsiflexion Achieved</text>
</svg>
